version: '3.8'
services:
  mongo:
    image: mongo:6
    container_name: ai_mongo
    ports:
      - "27017:27017"
    volumes:
      - ./mongodb_data:/data/db
  backend:
    build: .
    container_name: ai_backend
    ports:
      - "8000:8000"
    environment:
      - MONGODB_URI=mongodb://mongo:27017
      - MONGODB_DB=ai_exam
      - JWT_SECRET=supersecret
    depends_on:
      - mongo
